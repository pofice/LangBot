version: '3.8'

services:
  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3-management
    container_name: langbot-rabbitmq
    hostname: langbot-rabbitmq
    ports:
      - "5672:5672"    # AMQP端口
      - "15672:15672"  # 管理界面端口
    environment:
      RABBITMQ_DEFAULT_USER: langbot
      RABBITMQ_DEFAULT_PASS: langbot_password_2024
      RABBITMQ_DEFAULT_VHOST: langbot
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - langbot_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # LangBot核心服务
  langbot-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langbot-core
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - LANGBOT_MODE=server
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=langbot
      - RABBITMQ_PASS=langbot_password_2024
      - RABBITMQ_VHOST=langbot
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - langbot_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 微信客户端示例 (可选)
  wechat-client-1:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: langbot-wechat-client-1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - LANGBOT_MODE=client
      - LANGBOT_CLIENT_ID=wechat_client_001
      - LANGBOT_PLATFORM=wecom
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=langbot
      - RABBITMQ_PASS=langbot_password_2024
      - RABBITMQ_VHOST=langbot
      # 微信配置
      - WECOM_CORPID=${WECOM_CORPID}
      - WECOM_SECRET=${WECOM_SECRET}
      - WECOM_TOKEN=${WECOM_TOKEN}
      - WECOM_ENCODING_AES_KEY=${WECOM_ENCODING_AES_KEY}
      - WECOM_CONTACTS_SECRET=${WECOM_CONTACTS_SECRET}
    ports:
      - "8080:8080"  # 微信回调端口
    volumes:
      - ./config/client:/app/config
      - ./logs/client1:/app/logs
    networks:
      - langbot_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # 可以添加更多客户端实例
  wechat-client-2:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: langbot-wechat-client-2
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - LANGBOT_MODE=client
      - LANGBOT_CLIENT_ID=wechat_client_002
      - LANGBOT_PLATFORM=wecom
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=langbot
      - RABBITMQ_PASS=langbot_password_2024
      - RABBITMQ_VHOST=langbot
      # 微信配置
      - WECOM_CORPID=${WECOM_CORPID_2}
      - WECOM_SECRET=${WECOM_SECRET_2}
      - WECOM_TOKEN=${WECOM_TOKEN_2}
      - WECOM_ENCODING_AES_KEY=${WECOM_ENCODING_AES_KEY_2}
      - WECOM_CONTACTS_SECRET=${WECOM_CONTACTS_SECRET_2}
    ports:
      - "8081:8080"  # 不同的回调端口
    volumes:
      - ./config/client2:/app/config
      - ./logs/client2:/app/logs
    networks:
      - langbot_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis (可选，用于缓存和会话管理)
  redis:
    image: redis:7-alpine
    container_name: langbot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - langbot_network
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_password_2024
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis_password_2024", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx反向代理 (可选)
  nginx:
    image: nginx:alpine
    container_name: langbot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - langbot-core
    networks:
      - langbot_network
    restart: unless-stopped

volumes:
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local

networks:
  langbot_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16